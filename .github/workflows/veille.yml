name: Veille Éditoriale

on:
  schedule:
    - cron: "3 6 * * *"   # 7h heure de Paris (hiver) / 8h (été)
    - cron: "3 13 * * *"  # 14h heure de Paris (hiver) / 15h (été)
  workflow_dispatch:        # bouton "Run" manuel dans GitHub
  push:
    branches: [main]        # redéploie à chaque push

jobs:
  veille:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restaurer le cache articles
        uses: actions/cache@v4
        with:
          path: cache/
          key: articles-cache-${{ github.run_id }}
          restore-keys: |
            articles-cache-

      - name: Lancer la veille
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python veille.py

      - name: Commit du dashboard et du cache
        run: |
          git config user.name  "Veille Bot"
          git config user.email "veille@noreply.github.com"
          git add output/index.html cache/articles.json || true
          git diff --cached --quiet || git commit -m "🗞️ Veille — $(date +'%d/%m/%Y %H:%M')"
          git push || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

  deploy:
    needs: veille
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
